<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>Multi Video Downloader</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="imagenes/favicon.ico" />

    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/tarjetas.css" />
    <link rel="stylesheet" href="css/botones.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>

  <body>
    <header>
      <div class="logo">🎬 Multi Video Downloader</div>
    </header>

    <main>
      <section class="busqueda">
        <input id="url" type="text" placeholder="Pegue aquí la URL del video" />
        <div class="loadingContainer">
          <div
            class="tenor-gif-embed"
            data-postid="6449096453315144907"
            data-share-method="host"
            data-aspect-ratio="0.9875"
            data-width="100%"
          >
            <a href="https://tenor.com/view/loading-gif-6449096453315144907"
              >Loading Sticker</a
            >from
            <a href="https://tenor.com/search/loading-stickers"
              >Loading Stickers</a
            >
          </div>
          <script
            type="text/javascript"
            async
            src="https://tenor.com/embed.js"
          ></script>
        </div>

        <button id="buscar">
          <img id="btnImage" src="imagenes/busqueda.avif" /> Buscar
        </button>
      </section>

      <section id="preview" class="preview oculto">
        <video id="videoPreview" controls preload="metadata"></video>

        <div id="videoInfo"></div>
      </section>

      <section id="resultado"></section>

      <section id="resultado"></section>
    </main>

    <footer>© 2026</footer>

    <script src="js/utilidades.js"></script>
    <script src="js/variables_globales.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/modal.js"></script>
    <!-- <script src="js/descargas.js"></script> -->
    <script src="js/app.js"></script>
  </body>
</html>
